<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">LoomPress default phoenix logo</title>
  <desc id="desc">A stylized red phoenix used when no custom site logo is configured.</desc>
  <defs>
    <linearGradient id="phoenix-body" x1="160" y1="74" x2="294" y2="458" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff8ea1"/>
      <stop offset="0.42" stop-color="#ff3f4e"/>
      <stop offset="1" stop-color="#b40018"/>
    </linearGradient>
    <linearGradient id="phoenix-wing" x1="218" y1="84" x2="442" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffb4b7"/>
      <stop offset="0.28" stop-color="#ff5a57"/>
      <stop offset="1" stop-color="#c00016"/>
    </linearGradient>
    <linearGradient id="phoenix-tail" x1="128" y1="286" x2="282" y2="472" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff5d65"/>
      <stop offset="1" stop-color="#d10017"/>
    </linearGradient>
    <radialGradient id="phoenix-glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(250 250) rotate(90) scale(210)">
      <stop offset="0" stop-color="#ff6f72" stop-opacity="0.44"/>
      <stop offset="0.68" stop-color="#ff3c42" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ff3c42" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft-glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

